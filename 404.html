  <style>
    * {
      box-sizing: border-box;
    }

    /* Target both html and body to completely kill scrolling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Disables all scrollbars */
    }

    body {
      background-color: #292929;
      /* Added a subtle dark overlay so the white text is always readable */
      background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1476842634003-7dcca8f832de?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: rgba(255, 255, 255, 0.95);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-flow: column nowrap;
      justify-content: center;
      align-items: center;
      padding: 0 1.5rem;
      /* 100dvh dynamically adjusts to mobile address bars, falling back to 100vh for older browsers */
      height: 100vh;
      height: 100dvh; 
    }

    header {
      width: 100%;
      flex-grow: 1;
      display: flex;
      flex-flow: column nowrap;
      justify-content: center;
      align-items: center;
    }

    h1 {
      /* Removed white-space: nowrap to allow wrapping on mobile */
      line-height: 1.4;
      font-weight: 800;
      margin: 0;
      /* Fluid typography: scales automatically between 1.5rem (mobile) and 3rem (PC) */
      font-size: clamp(1.5rem, 5vw, 3rem);
    }

    footer {
      margin-bottom: 2rem;
      font-size: 0.95rem;
      letter-spacing: 1px;
      opacity: 0.8;
    }
  </style>
</head>
